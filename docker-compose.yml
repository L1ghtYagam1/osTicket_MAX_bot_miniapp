services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: max-support-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./webapp:/app/webapp
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: max-support-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck_bot.py"]
      interval: 30s
      timeout: 10s
      retries: 5

  caddy:
    image: caddy:2
    container_name: max-support-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
